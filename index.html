<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Will You Go On A Date With Me? 💕</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div class="hearts-background" id="heartsBackground"></div>
    
    <div class="container">
        <div class="initial-section" id="initialSection">
            <div class="heart-icon">💕</div>
            <h1>Will You Go On A Date With Me?</h1>
            <p class="subtitle">I think you're amazing and I'd love to spend time with you!</p>
            
            <div class="input-section">
                <input type="text" id="myName" placeholder="What's the name of the guy you're talking to?" />
                <input type="text" id="herName" placeholder="Enter your name please" />
            </div>

            <div class="button-section">
                <button class="yes-btn" id="yesBtn">YES! 💕</button>
            </div>

            <div class="button-container">
                <button class="no-btn" id="noBtn">NO</button>
            </div>
        </div>

        <div class="success-section" id="successSection">
            <div class="heart-icon" style="font-size: 80px;">💕</div>
            <h1 style="color: #e91e63; font-size: 32px;">YESSS! 🎉</h1>
            <div class="couple-names" id="coupleNames">Our Love Story ❤️</div>
            <div class="cute-message" id="cuteMessage">
                "I can't wait to see you smile in person!<br/>
                You make my heart skip a beat. 💖<br/>
                This is going to be amazing!"
            </div>
            <div class="success-details" id="successDetails"></div>
            <button class="restart-btn" id="restartBtn">Do It Again! 🔄</button>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
